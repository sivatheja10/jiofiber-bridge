; ===== OPTIONAL: inbound IVR (auto-attendant) =====
; Drop-in replacement for the [from-jio] block in extensions.conf.
; Instead of ringing every phone at once, answer the call, play a menu, and
; route by the digit the caller presses. Example:
;   1 -> a single person on their own extension (4001)
;   2 -> a household/user with two devices, rung in parallel (6001 + 6002)
;
; Add matching endpoints in pjsip.conf (see asterisk/pjsip.conf — 4001 is the
; same shape as 6001/6002). Record the menu prompt as an 8 kHz mono file and
; drop it at /var/lib/asterisk/sounds/en/custom/menu.wav (see README).

[from-jio]
exten => s,1,NoOp(INBOUND caller=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Set(CALLERID(num)=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Set(CALLERID(name)=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(TRIES=0)
 same => n(menu),Background(custom/menu)   ; interruptible: a keypress jumps to that extension
 same => n,WaitExten(7)                     ; wait up to 7s after the prompt for a digit
 same => n,Set(TRIES=$[${TRIES}+1])
 same => n,GotoIf($[${TRIES}<3]?menu)       ; replay the menu up to 3 times, then give up
 same => n,Hangup()

; 1 -> person A (single extension)
exten => 1,1,NoOp(IVR choice 1)
 same => n,Set(CALLERID(num)=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Dial(PJSIP/4001,35)
 same => n,Hangup()

; 2 -> person B (two devices in parallel)
exten => 2,1,NoOp(IVR choice 2)
 same => n,Set(CALLERID(num)=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Dial(PJSIP/6001&PJSIP/6002,35)
 same => n,Hangup()

; Any other request-uri user, or an invalid keypress, restarts the menu.
exten => _.,1,Goto(s,1)
