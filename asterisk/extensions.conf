[general]
static=yes
writeprotect=no

; Phones dial out -> normalize the number to what Jio accepts, then send to the bridge trunk.
; Jio wants off-net mobiles with the STD '0' prefix; toll-free / already-0-prefixed are dialed as-is.
[from-phones]
; +<CC> mobile (E.164) -> 0 + national 10-digit
exten => _+91XXXXXXXXXX,1,NoOp(OUT ${EXTEN} -> 0${EXTEN:3})
 same => n,Dial(PJSIP/0${EXTEN:3}@jio-trunk,60)
 same => n,Hangup()
; bare 10-digit mobile (6-9 start) -> prepend 0
exten => _[6-9]XXXXXXXXX,1,NoOp(OUT ${EXTEN} -> 0${EXTEN})
 same => n,Dial(PJSIP/0${EXTEN}@jio-trunk,60)
 same => n,Hangup()
; already 0-prefixed (STD/landline) -> as dialed
exten => _0X.,1,Dial(PJSIP/${EXTEN}@jio-trunk,60)
 same => n,Hangup()
; other +country -> strip the +
exten => _+X.,1,Dial(PJSIP/${EXTEN:1}@jio-trunk,60)
 same => n,Hangup()
; everything else (1800 / service numbers) -> as dialed
exten => _X.,1,Dial(PJSIP/${EXTEN}@jio-trunk,60)
 same => n,Hangup()

; Inbound from the bridge (request-URI user is 's'); set caller-ID from the X-Jio-Caller header,
; then ring all phones in parallel.
[from-jio]
exten => s,1,NoOp(INBOUND caller=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Set(CALLERID(num)=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Set(CALLERID(name)=${PJSIP_HEADER(read,X-Jio-Caller)})
 same => n,Dial(PJSIP/6001&PJSIP/6002,35)
 same => n,Hangup()
exten => _.,1,Goto(from-jio,s,1)
