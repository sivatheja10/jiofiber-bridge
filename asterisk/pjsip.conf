; Asterisk pjsip.conf — public registrar for your phones + static trunk to the bridge.
; Replace <ASTERISK_PUBLIC_IP>, <BRIDGE_OVERLAY_IP>, and the two passwords.

[global]
type=global
user_agent=HomePBX

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5560
external_media_address=<ASTERISK_PUBLIC_IP>
external_signaling_address=<ASTERISK_PUBLIC_IP>
local_net=100.64.0.0/10          ; Tailscale CGNAT range -> don't NAT-rewrite the trunk

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5560
external_media_address=<ASTERISK_PUBLIC_IP>
external_signaling_address=<ASTERISK_PUBLIC_IP>
local_net=100.64.0.0/10

; ===== Phone 1 =====
[6001]
type=endpoint
context=from-phones
disallow=all
allow=ulaw
auth=auth6001
aors=6001
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733
[auth6001]
type=auth
auth_type=userpass
username=6001
password=<RANDOM_PASSWORD_6001>
[6001]
type=aor
max_contacts=2
qualify_frequency=30
qualify_timeout=3

; ===== Phone 2 =====
[6002]
type=endpoint
context=from-phones
disallow=all
allow=ulaw
auth=auth6002
aors=6002
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733
[auth6002]
type=auth
auth_type=userpass
username=6002
password=<RANDOM_PASSWORD_6002>
[6002]
type=aor
max_contacts=2
qualify_frequency=30
qualify_timeout=3

; ===== Trunk to the JioFiber bridge (over the overlay network) =====
[jio-trunk]
type=endpoint
context=from-jio
disallow=all
allow=ulaw
aors=jio-trunk
direct_media=no
rtp_symmetric=yes
force_rport=yes
dtmf_mode=rfc4733
[jio-trunk]
type=aor
contact=sip:<BRIDGE_OVERLAY_IP>:5070
[jio-trunk]
type=identify
endpoint=jio-trunk
match=<BRIDGE_OVERLAY_IP>
